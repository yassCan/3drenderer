    <script>
        function subVector(a, b) {
            return {
                x: a.x - b.x,
                y: a.y - b.y,
                z: a.z - b.z
            };
        }

        function normalize(v) {
            const mag = Math.sqrt(v.x * v.x + v.y * v.y + v.z * v.z);

            return {
                x: v.x / mag,
                y: v.y / mag,
                z: v.z / mag
            };
        }
        function line(ctx, x1, y1, x2, y2, color) {
            ctx.beginPath()
            ctx.strokeStyle = color 
            ctx.lineWidth  = 1.5
            ctx.moveTo(x1+250, y1+250)
            ctx.lineTo(x2+250, y2+250)
            ctx.stroke()
        }
        
        function rect(ctx, x, y, w, h, color) {
            ctx.beginPath()
            ctx.fillStyle = color ?? 'lime'
            ctx.fillRect(x+250, y+250, w, h)
            ctx.stroke()
        }
    </script>
