<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="camera.js" defer></script>
    <script src="vertex.js" defer></script>
    <script src="main.js" defer></script>

</head>
<body>
    <script>
        function line(ctx, x1, y1, x2, y2, color) {
            ctx.beginPath()
            ctx.strokeStyle = color 
            ctx.lineWidth  = 0.6
            ctx.moveTo(x1+250, y1+250)
            ctx.lineTo(x2+250, y2+250)
            ctx.stroke()
        }
        
        function rect(ctx, x, y, w, h, color) {
            ctx.beginPath()
            ctx.fillStyle = color ?? 'lime'
            ctx.fillRect(x+250, y+250, w, h)
            ctx.stroke()
        }
    </script>
    <canvas id="c" width="500" height="500"></canvas>
    <button onclick="inter()">interact</button>
    <button onclick="dynamicAlpha()">dynamic alpha</button>
</body>
</html>
